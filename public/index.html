<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo App</title>
    <link rel="stylesheet" href="/styles.css" />
    <script>
      // Apply saved theme before first paint to prevent FOUC
      (function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
    </script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">Demo App</div>
      <nav>
        <a href="/">Home</a>
        <a href="/login.html">Sign in</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
      </nav>
    </header>

    <main class="container">
      <h1>Welcome</h1>
      <p>This is a tiny demo app used to showcase agentic development on GitHub.</p>
      <p>
        Try the <a href="/api/health">health endpoint</a> or sign in as
        <code>ada@example.com</code> / <code>password</code>.
      </p>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
